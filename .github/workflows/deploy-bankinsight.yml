name: Deploy BankInsight

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: BankInsight.API/Dockerfile
            context: .
          - service: frontend
            dockerfile: Dockerfile
            context: .
            build-args: VITE_API_URL=/api
          - service: migration
            dockerfile: migration/Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image namespace
        id: vars
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build-args }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/bankinsight-${{ matrix.service }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/bankinsight-${{ matrix.service }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image namespace
        id: vars
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Copy deployment compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/bankinginsight.compose.yml
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy on remote host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cat > "${{ secrets.DEPLOY_PATH }}/.env" <<EOF
            GHCR_OWNER=${{ steps.vars.outputs.owner_lc }}
            IMAGE_TAG=sha-${{ github.sha }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ASPNETCORE_ENVIRONMENT=Production
            Security__IpWhitelist__Enabled=false
            EOF
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose -f bankinginsight.compose.yml pull
            docker compose -f bankinginsight.compose.yml up -d
            docker image prune -f
