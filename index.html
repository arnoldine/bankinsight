<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://cdn.tailwindcss.com https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https: http://localhost:3000 http://localhost:3001 http://localhost:5176 ws: wss:;">
  <title>BankInsight | Core Banking System</title>
  <script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",

  <script type="module" src="/index.tsx"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg-wash: #f5f7fa;
      --grid-line: rgba(148, 163, 184, 0.14);
      --surface-border: #dbe2ea;
      --surface-shadow: 0 2px 8px rgba(15, 34, 52, 0.08);
      --surface-highlight: rgba(255, 255, 255, 1);
      --accent-glow: rgba(44, 90, 160, 0.10);
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    html {
      min-height: 100%;
      background: #f5f7fa;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg-wash);
      color: #1f2937;
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: none;
    }

    #root {
      min-height: 100vh;
      isolation: isolate;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Source Sans 3', sans-serif;
      color: #111827;
      letter-spacing: -0.01em;
      margin: 0;
    }

    p, span, div, label {
      color: inherit;
    }

    button, a, input, select, textarea {
      transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 2px solid rgba(37, 99, 235, 0.55);
      outline-offset: 2px;
    }

    .app-shell {
      position: relative;
    }

    .app-shell::before {
      content: none;
    }

    .glass-card {
      background: #ffffff;
      border: 1px solid var(--surface-border);
      box-shadow: var(--surface-shadow);
      backdrop-filter: none;
    }

    .dashboard-sheen {
      position: relative;
      overflow: hidden;
      background: #ffffff;
      color: #111827;
    }

    .dashboard-sheen::after,
    .dashboard-sheen::before {
      content: none;
    }

    .status-orb {
      position: relative;
    }

    .status-orb::after {
      content: none;
    }

    .card-hover {
      transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease;
    }

    .card-hover:hover {
      transform: none;
      border-color: #d1d9e2;
      box-shadow: 0 4px 12px rgba(15, 34, 52, 0.10);
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #e5e9ef;
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb {
      background: #9aa9ba;
      border-radius: 999px;
      border: 2px solid #e5e9ef;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #7f91a5;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: light;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
</body>

</html>
