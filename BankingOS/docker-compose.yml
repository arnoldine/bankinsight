services:
  postgres:
    image: postgres:15-alpine
    container_name: bankingos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bankingos
    ports:
      - "5435:5432"
    volumes:
      - bankingos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bankingos"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: BankingOS/api/Dockerfile
    container_name: bankingos-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DB_CONNECTION_STRING: Host=postgres;Database=bankingos;Username=postgres;Password=postgres
      JWT_SECRET: bankingos_dev_secret_must_be_at_least_32_characters_long_in_production_use_env_var
      Security__IpWhitelist__Enabled: "false"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5186:8080"
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: BankingOS/web/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: bankingos-web
    depends_on:
      - api
    ports:
      - "3007:80"
    restart: unless-stopped

volumes:
  bankingos_postgres_data:
