databases:
  - name: bankinsight-postgres
    plan: free
    databaseName: bankinsight
    user: bankinsight

services:
  - type: web
    name: bankinsight-frontend
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: bankinsight-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: bankinsight-api
    runtime: docker
    plan: free
    dockerfilePath: ./BankInsight.API/Dockerfile
    autoDeployTrigger: commit
    healthCheckPath: /swagger/index.html
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: Security__IpWhitelist__Enabled
        value: "false"
      - key: DB_CONNECTION_STRING
        fromDatabase:
          name: bankinsight-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
